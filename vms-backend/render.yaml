services:
  - type: web
    name: wizzybox-vms-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/vms-backend-1.0.0.jar
    plan: free
    envVars:
      - key: JAVA_VERSION
        value: "21"
      - key: CORS_ORIGINS
        value: https://vms-frontend-eight.vercel.app
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: wizzybox-vms-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: wizzybox-vms-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: wizzybox-vms-db
          property: password

databases:
  - name: wizzybox-vms-db
    databaseName: vms_db
    user: vms_user
    plan: free
